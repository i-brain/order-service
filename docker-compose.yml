services:
  postgres:
    image: postgres:15
    container_name: order-service-db
    environment:
      POSTGRES_DB: order_service
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - order_service_data:/var/lib/postgresql/data

volumes:
  order_service_data:
